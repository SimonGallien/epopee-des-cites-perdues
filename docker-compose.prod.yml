services:
    
  seed:
    build: .
    container_name: epopee_seed
    env_file:
      - .env
    command: python3 scripts/seed.py
    restart: "no"

  app:
    build: .
    container_name: epopee_app
    restart: always
    env_file:
      - .env
    environment:
      - PYTHONPATH=/usr/local/app      
    ports:
      - 8000:8000